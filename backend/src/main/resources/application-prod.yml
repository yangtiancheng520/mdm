server:
  port: 3000

spring:
  application:
    name: mdm-backend

  datasource:
    url: jdbc:mysql://prod-mysql:3306/mdm_prod?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: prod-redis
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    root: INFO
    com.vueadmin: INFO
  file:
    name: /var/log/mdm/mdm-backend.log

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
