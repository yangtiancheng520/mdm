server:
  port: 3000

spring:
  application:
    name: mdm-backend

  datasource:
    url: jdbc:mysql://localhost:3306/mdm?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      database: 1

jwt:
  secret: MDM-Test-Secret-Key-For-JWT-Token-Generation-2024
  expiration: 86400000

logging:
  level:
    root: INFO
    com.vueadmin: DEBUG
  file:
    name: logs/mdm-backend-test.log

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
